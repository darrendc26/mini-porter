name: my-app
image: darrendc26/my-app
replicas: 1
services:
  - name: go-backend
    path: ./examples/node-app/go_backend
    port: 8080

  - name: node-backend
    path: ./examples/node-app/node_backend
    port: 3000
    
dependencies:
  - name: postgres
    type: postgres
    port: 5432
    env:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres 
      POSTGRES_DB: postgres
    
  - name: redis
    type: redis
    port: 6379
    env:
      REDIS_PASSWORD: redis
