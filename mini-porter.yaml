name: mini-porter-apps # Replace with your app name
image: darrendc26/mini-porter-apps # Replace with your image name
replicas: 1 # Replace with number of replicas needed
services:
  - name: go-backend # Replace with your service name (eg. backend, frontend)
    path: ./examples/node-app/go_backend # Replace with your service path (eg. ./backend)
    port: 8080 # Add your service port

dependencies:
  - name: postgres
    type: postgres
    port: 5432
    env:
      POSTGRES_USER: env.POSTGRES_USER
      POSTGRES_PASSWORD: env.POSTGRES_PASSWORD 
      POSTGRES_DB: env.POSTGRES_DB
      
