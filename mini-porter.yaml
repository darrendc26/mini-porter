name: my-app # Replace with your app name
image: darrendc26/my-app # Replace with your app image
replicas: 1 # Replace with number of replicas needed
services:
  - name: go-backend # Replace with your service name (eg. backend, frontend)
    path: /home/darren/Desktop/projects/mini-porter/examples/node-app/go_backend # Add your service path, not relative to mini-porter.yaml
    port: 8080 # Add your service port

  - name: node-backend
    path: /home/darren/Desktop/projects/mini-porter/examples/node-app/node_backend
    port: 3000  

dependencies:
  - name: postgres
    type: postgres
    port: 5432
    env:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres 
      POSTGRES_DB: postgres 
      POSTGRES_HOST: postgres

  - name: redis
    type: redis
    port: 6379
    env:
      REDIS_PASSWORD: redis
      REDIS_HOST: redis